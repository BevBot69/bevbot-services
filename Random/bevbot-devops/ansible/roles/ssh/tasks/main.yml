---
# ansible/roles/ssh/tasks/main.yml

- name: Ensure .ssh directory exists for user
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.ssh"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  tags: ssh

- name: Deploy authorized_keys
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    state: present
    exclusive: true          # Remove keys not listed here
    key: "{{ authorized_keys | join('\n') }}"
  tags: ssh

- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config.d/99-bevbot-hardened.conf
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd
  tags: ssh

- name: Disable SSH host key types we don't want
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?HostKey /etc/ssh/ssh_host_{{ item }}_key"
    line: "#HostKey /etc/ssh/ssh_host_{{ item }}_key"
  loop:
    - dsa
    - ecdsa
  notify: Restart sshd
  tags: ssh

# Generate Ed25519 host key if not present (uCore default, but be explicit)
- name: Ensure Ed25519 host key exists
  ansible.builtin.command: ssh-keygen -t ed25519 -f /etc/ssh/ssh_host_ed25519_key -N ""
  args:
    creates: /etc/ssh/ssh_host_ed25519_key
  notify: Restart sshd
  tags: ssh

- name: Enable and start sshd
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started
  tags: ssh
