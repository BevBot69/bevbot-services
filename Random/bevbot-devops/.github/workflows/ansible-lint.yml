---
# .github/workflows/ansible-lint.yml
# Lints all Ansible playbooks and roles on every push/PR.
# No secrets are needed — this only lints, never deploys.

name: Ansible Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Playbooks and Roles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and ansible-lint
        run: |
          pip install ansible ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run ansible-lint
        run: |
          ansible-lint ansible/
        env:
          ANSIBLE_VAULT_PASSWORD: "dummy-for-lint"  # Lint doesn't decrypt

      - name: Check playbook syntax
        run: |
          for playbook in ansible/playbooks/*.yml; do
            echo "Checking syntax: $playbook"
            ansible-playbook --syntax-check \
              -i ansible/inventory/hosts.example.yml \
              "$playbook"
          done
